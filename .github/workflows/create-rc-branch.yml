name: Create RC Branch

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  administration: write

jobs:
  create-rc:
    runs-on: ubuntu-latest

    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must be in X.Y.Z format"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Create RC branch
        run: |
          git checkout -b rc-${{ github.event.inputs.version }}

      - name: Update MARKETING_VERSION in project.pbxproj
        run: |
          sed -i 's/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ github.event.inputs.version }}/g' \
            Wevo.xcodeproj/project.pbxproj

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Wevo.xcodeproj/project.pbxproj
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}"

      - name: Push RC branch
        run: |
          git push origin rc-${{ github.event.inputs.version }}

      - name: Create branch protection ruleset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          jq -n \
            --arg version "$VERSION" \
            '{
              name: ("Protect rc-" + $version),
              target: "branch",
              enforcement: "active",
              conditions: {
                ref_name: {
                  include: [("refs/heads/rc-" + $version)],
                  exclude: []
                }
              },
              rules: [
                {type: "deletion"},
                {type: "non_fast_forward"},
                {
                  type: "pull_request",
                  parameters: {
                    required_approving_review_count: 0,
                    dismiss_stale_reviews_on_push: false,
                    required_reviewers: [],
                    require_code_owner_review: false,
                    require_last_push_approval: false,
                    required_review_thread_resolution: false,
                    allowed_merge_methods: ["squash"]
                  }
                },
                {
                  type: "required_status_checks",
                  parameters: {
                    strict_required_status_checks_policy: false,
                    do_not_enforce_on_create: true,
                    required_status_checks: [
                      {context: "Wevo | Unit Test", integration_id: 117084}
                    ]
                  }
                }
              ],
              bypass_actors: []
            }' | \
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/rulesets \
            --input -
