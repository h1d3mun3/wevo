name: Create RC Branch

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-rc:
    runs-on: ubuntu-latest

    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must be in X.Y.Z format"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Create RC branch
        run: |
          git checkout -b rc-${{ github.event.inputs.version }}

      - name: Update MARKETING_VERSION in project.pbxproj
        run: |
          sed -i 's/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ github.event.inputs.version }}/g' \
            Wevo.xcodeproj/project.pbxproj

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Wevo.xcodeproj/project.pbxproj
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}"

      - name: Push RC branch
        run: |
          git push origin rc-${{ github.event.inputs.version }}
